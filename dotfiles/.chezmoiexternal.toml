[".oh-my-zsh"]
type = "archive"
url = "https://github.com/ohmyzsh/ohmyzsh/archive/master.tar.gz"
exact = true
stripComponents = 1
refreshPeriod = "168h"
exclude = ["*/custom"]

[".oh-my-zsh/custom/plugins/zsh-vi-mode"]
type = "archive"
url = "https://github.com/jeffreytse/zsh-vi-mode/archive/master.tar.gz"
exact = true
stripComponents = 1
refreshPeriod = "168h"

[".config/alacritty/themes"]
type = "archive"
url = "https://github.com/alacritty/alacritty-theme/archive/master.tar.gz"
exact = true
stripComponents = 2
include = ["*/themes/*.toml"]
